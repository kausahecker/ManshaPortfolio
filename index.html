<html>

<head>
    <title>Mansha Bhasin - Home</title>
    <link rel="stylesheet" href="style.css?v=fresh_v18" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" />
</head>

<body>
    <div class="scroll-wrapper">
        <div class="sticky-container">

            <!-- Hero Text -->
            <img src="res/SCROLL DOWN TO JOIN MY JOURNEY.png" alt="Scroll Down" class="hero-text">

            <!-- The Hands Container -->
            <div class="animation-container">                    
                <div class="perfect-overlap-box">
                    <svg id="threads-svg" viewBox="0 0 1719 443" preserveAspectRatio="none">
                        <path class="thread-path" d="" />
                        <path class="thread-path" d="" />
                        <path class="thread-path" d="" />
                        <path class="thread-path" d="" />
                        <path class="thread-path" d="" />
                    </svg>
                </div>
                
                <img src="res/LEFT HAND.png" alt="Left Hand" class="hand hand-left">
                <img src="res/RIGHT HAND.png" alt="Right Hand" class="hand hand-right">
            </div>

                <!-- Bottom Logo Default -->
                <img src="res/LOGO.png" alt="Logo" class="hero-logo">

            <!-- The Actual Home Page Content that fades in -->
            <div class="home-content">
                <nav class="navbar">
                    <div class="nav-left">
                        <img class="logo-name" src="res/LOGO AND NAME.png" alt="Logo">
                        <img class="person-description" src="res/BRAND DESIGNER.png" alt="UserDesc">
                    </div>
                    <ul class="nav_links">
                        <li><a href="" class="nav_link nav_link--active"><img src="res/HOME NAVBAR.png" alt="Home" class="nav-img"></a></li>
                        <li><a href="about.html" class="nav_link"><img src="res/ABOUT NAVBAR.png" alt="About" class="nav-img"></a></li>
                        <li><a href="playground.html" class="nav_link"><img src="res/PLAYGROUND NAVBAR.png" alt="Playground" class="nav-img"></a></li>
                        <li><a href="resume.html" class="nav_link"><img src="res/RESUME NAVBAR.png" alt="Resume" class="nav-img"></a></li>
                    </ul>
                </nav>

                <div class="perfect-overlap-box">
                    <div class="project_table">
                        <div class="project_row" data-color="pink">
                            <div class="project_divider"></div>
                            <div class="project_num"><img src="res/n1.png" alt="#1"></div>
                            <div class="project_name"><img src="res/CANVORY PATISSERIE.png" alt="Canvory Patisserie"></div>
                            <div class="project_year"><img src="res/2025.png" alt="2025"></div>
                            <div class="project_type"><img src="res/BRAND IDENTITY.png" alt="Brand Identity"></div>
                            <img class="project_preview" src="res/CANVORY PATISSERIE TOOLTIP.png" alt="Canvory Patisserie Preview">
                        </div>
                        <div class="project_row" data-color="green">
                            <div class="project_divider"></div>
                            <div class="project_num"><img src="res/n2.png" alt="#2"></div>
                            <div class="project_name"><img src="res/SKIN CYCLES.png" alt="Skin Cycles"></div>
                            <div class="project_year"><img src="res/2026.png" alt="2026"></div>
                            <div class="project_type"><img src="res/BRAND IDENTITY.png" alt="Brand Identity"></div>
                            <img class="project_preview" src="res/SKIN CYCLES TOOLTIP.png" alt="Skin Cycles Preview">
                        </div>
                        <div class="project_row" data-color="blue">
                            <div class="project_divider"></div>
                            <div class="project_num"><img src="res/n3.png" alt="#3"></div>
                            <div class="project_name"><img src="res/SUNDAY SOUL SANTE.png" alt="Sunday Soul Sante"></div>
                            <div class="project_year"><img src="res/2026.png" alt="2026"></div>
                            <div class="project_type"><img src="res/REBRAND.png" alt="Rebrand"></div>
                            <img class="project_preview" src="res/SUNDAY SOUL SANTE TOOLTIP.png" alt="Sunday Soul Sante Preview">
                        </div>
                        <div class="project_row" data-color="yellow">
                            <div class="project_divider"></div>
                            <div class="project_num"><img src="res/n4.png" alt="#4"></div>
                            <div class="project_name"><img src="res/LOGOFOLIO.png" alt="Logofolio"></div>
                            <div class="project_year"><img src="res/2024-2026.png" alt="2024-2026"></div>
                            <div class="project_type"><img src="res/LOGO DESIGN.png" alt="Logo Design"></div>
                            <img class="project_preview" src="res/LOGOFOLIO TOOLTIP.png" alt="Logofolio Preview">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- GSAP Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="main_v11.js?v=fresh_v18"></script>
</body>

</html>
